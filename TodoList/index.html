<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mis Pendientes</title>
<link rel="stylesheet" href="./styles.css">
</head>
<body>

<header>
  <h1>Mis Pendientes</h1>
  <span id="save-status">guardado ✓</span>
</header>

<div class="layout">
  <button id="sidebar-toggle">
    <span class="toggle-day" id="toggle-day-label">hoy</span>
    <span style="color:var(--text-muted);font-size:11px;">▸ cambiar día</span>
    <span class="toggle-arrow">▼</span>
  </button>
  <aside id="sidebar">
    <div class="sidebar-label">días</div>
    <div id="day-list"></div>
    <div class="sidebar-date-wrap">
      <input type="date" id="goto-date" title="Ir a otro día" />
    </div>
  </aside>

  <main>
    <div class="day-title" id="day-title"></div>
    <div class="progress-bar-wrap" id="progress-wrap" style="display:none">
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
      <span class="progress-text" id="progress-text"></span>
    </div>

    <div class="input-row">
      <input type="text" id="new-task" placeholder="nuevo pendiente…" autocomplete="off" />
      <button id="add-btn">+</button>
    </div>

    <div id="task-list"></div>
    <button id="clear-done">limpiar completados</button>
  </main>
</div>

<script src="./function.js"></script>
</body>
</html>
